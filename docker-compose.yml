services:
  app:
    build: .
    ports:
      - "8080:80"
    volumes:
      - ./app:/var/www/app
      - ./config:/var/www/config
      - ./resources:/var/www/resources
      - ./routes:/var/www/routes
      - ./public:/var/www/public
      - ./lang:/var/www/lang
      - ./database/migrations:/var/www/database/migrations
      - db_data:/var/www/database
      - storage_data:/var/www/storage/app
      - ${VIDEOS_PATH}:/var/www/storage/app/videos
    env_file:
      - .env
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
    restart: unless-stopped

  jackett:
    image: lscr.io/linuxserver/jackett:latest
    ports:
      - "9117:9117"
    volumes:
      - jackett_data:/config
    restart: unless-stopped

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    ports:
      - "8191:8191"
    environment:
      - LOG_LEVEL=info
    restart: unless-stopped

  stream:
    build: ./stream-server
    ports:
      - "9090:9090"
    restart: unless-stopped

volumes:
  db_data:
  storage_data:
  jackett_data:
