services:
  app:
    build: .
    ports:
      - "8080:80"
    volumes:
      - db_data:/var/www/database
      - storage_data:/var/www/storage/app
      - /mnt/c/Users/Renato/Downloads/Series:/var/www/storage/app/videos
    env_file:
      - .env
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
    restart: unless-stopped

  jackett:
    image: lscr.io/linuxserver/jackett:latest
    ports:
      - "9117:9117"
    volumes:
      - jackett_data:/config
    restart: unless-stopped

  stream:
    build: ./stream-server
    ports:
      - "9090:9090"
    restart: unless-stopped

volumes:
  db_data:
  storage_data:
  jackett_data:
